<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Alex Data Portal</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>

    <div id="preloader"><div class="spinner"></div></div>

    <main class="auth-main d-flex align-items-center justify-content-center py-5" style="min-height: 100vh;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-7 col-xl-6">
                    <div class="auth-toolbar d-flex justify-content-end mb-4">
                        <button id="theme-toggle" class="btn btn-link auth-theme-toggle p-0" aria-label="Toggle Dark Mode">
                            <i class="bi bi-moon-stars fs-4"></i>
                        </button>
                    </div>
                    <div class="card-custom auth-card">
                    <a href="index.html" class="navbar-brand auth-brand justify-content-center mb-4">
                        <i class="bi bi-graph-up-arrow me-2"></i>ALEX.DATA
                    </a>
                    <h3 class="mb-4">Create Client Account</h3>
                    <form class="needs-validation" novalidate>
                        <div class="row text-start">
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="register-full-name">Full Name</label>
                                <input id="register-full-name" type="text" class="form-control form-control-theme" required placeholder="Jane Doe">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="register-company">Company</label>
                                <input id="register-company" type="text" class="form-control form-control-theme" placeholder="Acme Inc.">
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label" for="register-email">Business Email</label>
                                <input id="register-email" type="email" class="form-control form-control-theme" required placeholder="jane@company.com">
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label" for="register-password">Password</label>
                                <input id="register-password" type="password" class="form-control form-control-theme" required placeholder="Minimum 8 characters">
                            </div>
                        </div>
                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input border-secondary" id="termsChecked" required>
                            <label class="form-check-label text-muted small" for="termsChecked">I agree to the <a href="#" class="text-secondary auth-link">Terms of Service</a> and Data Policy.</label>
                        </div>
                        <button type="submit" class="btn-custom btn-primary-custom w-100 mb-3">Create Account</button>
                        <div class="login-divider"><span>or</span></div>
                        <a href="#" class="btn-custom btn-google-custom auth-social-btn w-100 mb-3">
                            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <path fill="#EA4335" d="M12 10.2v3.9h5.4c-.2 1.3-1.5 3.9-5.4 3.9-3.2 0-5.9-2.7-5.9-6s2.7-6 5.9-6c1.8 0 3 .8 3.7 1.5l2.5-2.4C16.7 3.6 14.6 2.7 12 2.7c-5.1 0-9.3 4.2-9.3 9.3s4.1 9.3 9.3 9.3c5.4 0 9-3.8 9-9.1 0-.6-.1-1.1-.2-1.6H12Z"/>
                                <path fill="#4285F4" d="M3.8 7.6l3.2 2.3C7.8 8 9.7 6.6 12 6.6c1.8 0 3 .8 3.7 1.5l2.5-2.4C16.7 3.6 14.6 2.7 12 2.7c-3.6 0-6.7 2-8.2 4.9Z"/>
                                <path fill="#FBBC05" d="M12 21.3c2.6 0 4.7-.8 6.2-2.4l-3-2.4c-.8.6-1.9 1-3.3 1-3.8 0-5.2-2.6-5.4-3.8l-3.2 2.5c1.5 3 4.6 5.1 8.7 5.1Z"/>
                                <path fill="#34A853" d="M3.3 16.2l3.2-2.5c-.2-.5-.4-1.1-.4-1.7s.1-1.2.4-1.7L3.3 7.8C2.8 8.9 2.5 10 2.5 12s.3 3.1.8 4.2Z"/>
                            </svg>
                            <span>Continue with Google</span>
                        </a>
                        <a href="#" class="btn-custom btn-linkedin-custom auth-social-btn w-100 mb-3">
                            <i class="bi bi-linkedin" aria-hidden="true"></i>
                            <span>Continue with LinkedIn</span>
                        </a>
                        <p class="text-center text-muted small">Already registered? <a href="login.html" class="text-secondary auth-link">Sign in</a></p>
                    </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
